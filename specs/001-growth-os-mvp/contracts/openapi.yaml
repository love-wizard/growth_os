openapi: 3.1.0
info:
  title: Growth OS v0.1 MVP API
  version: 0.1.0
  description: Internal contract for the Growth OS v0.1 web app route handlers and Supabase-backed operations.
servers:
  - url: /api
security:
  - supabaseAuth: []
components:
  securitySchemes:
    supabaseAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
    ChildProfileInput:
      type: object
      required: [name, nickname, birthDate, gender]
      properties:
        name:
          type: string
        nickname:
          type: string
        birthDate:
          type: string
          format: date
        gender:
          type: string
    AnnualGoalInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        category:
          type: string
    OnboardingRequest:
      type: object
      required: [childProfile, interests, annualGoals]
      properties:
        childProfile:
          $ref: "#/components/schemas/ChildProfileInput"
        interests:
          type: array
          items:
            type: string
          minItems: 1
        annualGoals:
          type: array
          items:
            $ref: "#/components/schemas/AnnualGoalInput"
          minItems: 1
    FirstGuidanceRequest:
      type: object
      required: [childNickname, childBirthDate, focusDirections, currentChallenge, childTraits]
      properties:
        childNickname:
          type: string
        childBirthDate:
          type: string
          format: date
        focusDirections:
          type: array
          items:
            type: string
          minItems: 2
          maxItems: 3
        currentChallenge:
          type: string
          enum:
            - interest_resistance
            - reading_difficulty
            - unclear_english_exposure
            - limited_time_tonight
            - weekend_activity_need
            - emotional_sensitivity
            - decreased_physical_activity
            - recent_growth_review
        childTraits:
          type: array
          items:
            type: string
            enum:
              - active
              - sensitive
              - slow_to_warm_up
              - likes_praise
              - likes_competition
              - strong_willed
              - easily_frustrated
              - curious
              - prefers_routines
          minItems: 1
          maxItems: 3
    FirstGuidanceResponse:
      type: object
      required: [sessionId, todaySuggestion]
      properties:
        sessionId:
          type: string
          format: uuid
        todaySuggestion:
          type: object
          required: [title, childSpecificContext, likelyInterpretation, action, estimatedMinutes, whyItHelps, gentleFallback]
          properties:
            title:
              type: string
            childSpecificContext:
              type: string
            likelyInterpretation:
              type: string
            action:
              type: string
            estimatedMinutes:
              type: integer
              minimum: 1
            whyItHelps:
              type: string
            gentleFallback:
              type: string
    AcceptSuggestionRequest:
      type: object
      properties:
        addToWeeklyPlan:
          type: boolean
        taskAssigneeType:
          type: string
          enum: [father, mother, child, family]
    GrowthRecordDraftRequest:
      type: object
      required: [sourceType, sourceId]
      properties:
        sourceType:
          type: string
          enum: [weekly_task, ai_suggestion, parent_note]
        sourceId:
          type: string
        parentNote:
          type: string
    InviteParentRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
          format: email
        role:
          type: string
          enum: [father, mother]
    WeeklyTask:
      type: object
      required: [id, title, assigneeType, plannedCount, completedCount, remainingCount, status]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        assigneeType:
          type: string
          enum: [father, mother, child, family]
        plannedCount:
          type: integer
          minimum: 0
        completedCount:
          type: integer
          minimum: 0
        remainingCount:
          type: integer
          minimum: 0
        status:
          type: string
          enum: [not_started, in_progress, completed]
    WeeklyPlan:
      type: object
      required: [id, theme, weekStartDate, weekEndDate, completionRate, tasks]
      properties:
        id:
          type: string
          format: uuid
        theme:
          type: string
        weekStartDate:
          type: string
          format: date
        weekEndDate:
          type: string
          format: date
        completionRate:
          type: number
          minimum: 0
          maximum: 1
        readingRecommendation:
          type: string
        englishRecommendation:
          type: string
        weekendActivity:
          type: string
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/WeeklyTask"
    UpdateTaskProgressRequest:
      type: object
      required: [completedCount]
      properties:
        completedCount:
          type: integer
          minimum: 0
    InterestParticipationRecordInput:
      type: object
      required: [interestId, happenedOn, participationOutcome]
      properties:
        interestId:
          type: string
          format: uuid
        happenedOn:
          type: string
          format: date
        participationOutcome:
          type: string
          enum: [completed, missed, cancelled, rescheduled]
        durationMinutes:
          type: integer
          minimum: 0
        count:
          type: integer
          minimum: 0
        notes:
          type: string
    GrowthRecordInput:
      type: object
      required: [happenedOn, text]
      properties:
        happenedOn:
          type: string
          format: date
        text:
          type: string
        tags:
          type: array
          items:
            type: string
        parentNotes:
          type: string
    AICoachRequest:
      type: object
      required: [mode, message]
      properties:
        mode:
          type: string
          enum: [parenting_qa, activity_generation, growth_analysis, weekly_plan_draft]
        message:
          type: string
    AICoachResponse:
      type: object
      required: [conversationId, mode, response]
      properties:
        conversationId:
          type: string
          format: uuid
        mode:
          type: string
        response:
          type: object
        draftId:
          type: string
          format: uuid
    ProductMetricEventRequest:
      type: object
      required: [eventName]
      properties:
        eventName:
          type: string
          enum:
            - first_guidance_generated
            - ai_suggestion_adopted
            - weekly_plan_confirmed
            - companionship_action_completed
            - growth_record_created
            - next_week_returned
            - organic_second_week_returned
            - reminder_driven_second_week_returned
            - warm_reminder_enabled
            - warm_reminder_opened
            - warm_reminder_action_completed
            - generic_ai_comparison_recorded
            - payment_intent_recorded
            - expert_trust_feedback_recorded
            - expert_review_completed
            - expert_qa_requested
            - wechat_mini_program_entry_opened
            - wechat_scenario_card_opened
            - wechat_family_invite_shared
            - wechat_family_invite_accepted
            - wechat_subscription_message_opted_in
            - wechat_subscription_message_opened
            - wechat_record_card_shared
            - wechat_private_beta_service_contacted
            - wechat_mini_program_code_scanned
            - parent_anxiety_pulse_recorded
        eventProperties:
          type: object
          additionalProperties: true
    NotificationPreferenceRequest:
      type: object
      required: [reminderType, enabled]
      properties:
        reminderType:
          type: string
          enum:
            - evening_companionship
            - weekend_planning
            - accepted_suggestion_follow_up
            - weekly_reset
        enabled:
          type: boolean
        preferredWindow:
          type: string
    ExpertReviewRequest:
      type: object
      required: [conversationId, reviewStatus, qualityScores, safetyBoundaryPassed]
      properties:
        conversationId:
          type: string
          format: uuid
        reviewStatus:
          type: string
          enum: [passed, needs_revision, safety_boundary_failed]
        qualityScores:
          type: object
          additionalProperties:
            type: integer
            minimum: 1
            maximum: 5
        safetyBoundaryPassed:
          type: boolean
        reviewNotes:
          type: string
    ValidationScorecardResponse:
      type: object
      required: [periodStart, periodEnd, metrics]
      properties:
        periodStart:
          type: string
          format: date
        periodEnd:
          type: string
          format: date
        metrics:
          type: object
          additionalProperties: true
        notes:
          type: string
    WeChatScenarioEntryRequest:
      type: object
      required: [scenarioType]
      properties:
        scenarioType:
          type: string
          enum:
            - piano_resistance
            - limited_evening_time
            - reading_recovery
            - english_exposure
            - weekend_activity
        sourceContext:
          type: object
          additionalProperties: true
    WeChatFamilyInviteRequest:
      type: object
      required: [familyId, role]
      properties:
        familyId:
          type: string
          format: uuid
        role:
          type: string
          enum: [father, mother]
    WeChatIdentityBindingRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: WeChat Mini Program login code exchanged server-side for identity binding.
    WeChatSubscriptionPreferenceRequest:
      type: object
      required: [reminderType, enabled]
      properties:
        reminderType:
          type: string
          enum:
            - evening_companionship
            - weekend_planning
            - accepted_suggestion_follow_up
            - weekly_reset
        enabled:
          type: boolean
        templateId:
          type: string
    WeChatRecordSharePreviewRequest:
      type: object
      required: [recordId]
      properties:
        recordId:
          type: string
          format: uuid
    WeChatRecordSharePreviewResponse:
      type: object
      required: [previewId, title, summary]
      properties:
        previewId:
          type: string
          format: uuid
        title:
          type: string
        summary:
          type: string
        authorized:
          type: boolean
paths:
  /first-guidance:
    post:
      summary: Generate today's companionship suggestion before full onboarding
      description: Creates a lightweight first-guidance session from child nickname, birth date, 2-3 focus directions, one current challenge, and 1-3 child traits.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FirstGuidanceRequest"
      responses:
        "201":
          description: Today's companionship suggestion generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FirstGuidanceResponse"
  /first-guidance/{sessionId}/accept:
    post:
      summary: Accept first-guidance suggestion
      description: Marks a suggestion as accepted and optionally adds it to the current weekly plan.
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptSuggestionRequest"
      responses:
        "200":
          description: Suggestion accepted
  /onboarding:
    post:
      summary: Create family, child profile, interests, goals, and initial growth system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingRequest"
      responses:
        "201":
          description: Family workspace created
        "400":
          description: Missing required onboarding data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /family/invite:
    post:
      summary: Invite second parent to the existing family
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteParentRequest"
      responses:
        "200":
          description: Invitation created
  /family/invite/{inviteId}/accept:
    post:
      summary: Accept second-parent invitation to existing family
      description: Joins the invited parent to the existing family workspace without creating a duplicate family or child profile.
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invitation accepted
        "409":
          description: Invitation would create a duplicate family or child profile
  /dashboard:
    get:
      summary: Get dashboard data
      responses:
        "200":
          description: Dashboard payload with primary today's companionship suggestion, goals, theme, supportive progress signal, AI coach entry, and today tasks
  /notification-preferences:
    patch:
      summary: Update warm reminder preference
      description: Enables or disables low-pressure companionship reminder types for the authenticated parent.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferenceRequest"
      responses:
        "200":
          description: Warm reminder preference updated
  /admin/expert-reviews:
    post:
      summary: Create internal expert quality review for sampled AI answer
      description: Requires an authenticated active internal reviewer or service-role workflow; does not expose real-time expert consulting to parents.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExpertReviewRequest"
      responses:
        "201":
          description: Expert review recorded
        "403":
          description: Internal reviewer access required
  /admin/validation-scorecard:
    get:
      summary: Export aggregated private-beta validation scorecard
      description: Aggregates product metrics for private-beta review without child ranking, social comparison, photos, videos, or detailed private notes.
      responses:
        "200":
          description: Aggregated scorecard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationScorecardResponse"
        "403":
          description: Internal reviewer access required
  /weekly-plan/current:
    get:
      summary: Get current official weekly plan
      responses:
        "200":
          description: Current weekly plan
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeeklyPlan"
  /weekly-plan/tasks/{taskId}/progress:
    patch:
      summary: Update completed count for a weekly task
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskProgressRequest"
      responses:
        "200":
          description: Task progress updated
        "422":
          description: Completed count exceeds planned count
  /ai/coach:
    post:
      summary: Ask AI growth coach
      description: Server assembles family context and calls AI. Media contents and deleted data are excluded.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AICoachRequest"
      responses:
        "200":
          description: AI coach response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AICoachResponse"
  /ai/weekly-plan-drafts/{draftId}/confirm:
    post:
      summary: Confirm AI weekly plan draft as official plan
      parameters:
        - name: draftId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Draft confirmed and official plan created or replaced
  /wechat/identity-bindings:
    post:
      summary: Bind authenticated parent to WeChat Mini Program identity
      description: WeChat identity reduces entry friction but does not grant family access without family membership.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeChatIdentityBindingRequest"
      responses:
        "200":
          description: WeChat identity bound
  /wechat/scenario-entry:
    post:
      summary: Record WeChat scenario-card entry and route to first-guidance or AI coach flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeChatScenarioEntryRequest"
      responses:
        "200":
          description: Scenario entry recorded
  /wechat/family-invite:
    post:
      summary: Create privacy-safe WeChat family invite card payload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeChatFamilyInviteRequest"
      responses:
        "201":
          description: WeChat family invite created
  /wechat/family-invite/{inviteId}/accept:
    post:
      summary: Accept WeChat family invite after normal family authorization checks
      parameters:
        - name: inviteId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Invite accepted without duplicate family or child profile creation
  /wechat/subscription-preferences:
    patch:
      summary: Update WeChat subscription-message preference for approved warm reminder types
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeChatSubscriptionPreferenceRequest"
      responses:
        "200":
          description: WeChat subscription preference updated
  /wechat/record-share-preview:
    post:
      summary: Create privacy-safe growth record share preview
      description: Preview must not expose photos, videos, detailed notes, or performance-like claims to unauthorized recipients.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeChatRecordSharePreviewRequest"
      responses:
        "201":
          description: Privacy-safe preview created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WeChatRecordSharePreviewResponse"
  /interest-participation-records:
    post:
      summary: Create actual interest participation or practice record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterestParticipationRecordInput"
      responses:
        "201":
          description: Interest participation record created
  /interest-participation-records/{recordId}:
    delete:
      summary: Delete interest participation record with 30-day restore window
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Record deleted
  /interest-participation-records/{recordId}/restore:
    post:
      summary: Restore deleted interest participation record within restore window
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Record restored
  /growth-records:
    post:
      summary: Create growth record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrowthRecordInput"
      responses:
        "201":
          description: Growth record created
  /growth-record-drafts:
    post:
      summary: Create editable growth record draft from a completed task, accepted AI suggestion, or parent note
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrowthRecordDraftRequest"
      responses:
        "201":
          description: Growth record draft created
  /growth-records/{recordId}:
    delete:
      summary: Delete growth record with 30-day restore window
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Record deleted
  /growth-records/{recordId}/restore:
    post:
      summary: Restore deleted growth record within restore window
      parameters:
        - name: recordId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Record restored
  /product-events:
    post:
      summary: Record privacy-conscious product metric event
      description: Records family-scoped MVP learning events without child ranking or comparative scoring.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductMetricEventRequest"
      responses:
        "202":
          description: Event accepted
